<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do App</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5">
    <h2 class="text-center">To-Do List</h2>

    <!-- Input + Button -->
    <div class="d-flex mt-3">
        <input type="text" id="taskInput" class="form-control" placeholder="Enter task">
        <button id="addBtn" class="btn btn-primary ms-2">Add</button>
    </div>

    <!-- Task List -->
    <ul id="taskList" class="list-group mt-4"></ul>

    <!-- Total Tasks -->
    <p class="mt-3">Total Tasks: <span id="count">0</span></p>

    <!-- Clear All -->
    <button id="clearAll" class="btn btn-danger">Clear All</button>
</div>

<script src="script.js"></script>
</body>
</html>
